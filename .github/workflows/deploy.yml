name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            whoami
            pwd
            which node
            node -v
            which npm
            npm -v
            
            cd /var/www/tayeh-frontend

            # Update the repository
            git fetch origin
            git reset --hard origin/main

            # Install dependencies
            npm ci

            # Build the app
            npm run build